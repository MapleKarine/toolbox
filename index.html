    <meta name="description" content="My collection of conlanging tools" />
    <meta property="og:description" content="My collection of conlanging tools" />

    <meta name="theme-color" content="#6d72c6">
    <title>Toolbox</title>
    <link rel="stylesheet" type="text/css" href="/assets/style.css">

<body>
<header>
  <nav class="top">
    <!-- <a href="/toolbox/" class="button circle transparent"><i class="icon">home</i></a> -->
    <span class="max" style="font-weight: bold;">Toolbox</span>
    <button tabindex="-1" id="theme-switch" title="Change theme" aria-label="Change theme" class="transparent circle">
      <i class='icon'>light_mode</i>
    </button>
  </nav>
</header>
<main>
  <h1>Toolbox</h1>
  <p>This is my collection of tools for conlanging.</p>
  <div class="grid">
    <div class="card s12">
      <h5><a href="/toolbox/gloss">Glosser</a></h5>
      <p>Format neatly aligned interlinear glosses.</p>
    </div>
    <div class="card s12">
      <h5><a href="/toolbox/ipa_chart">IPA Chart</a></h5>
      <p>Automatically generate consonant tables and vowel charts from a list of IPA phonemes.</p>
    </div>
    <div class="card s12">
      <h5><a href="/toolbox/unicode_analyzer">Unicode Analyzer</a></h5>
      <p>Insert text and inspect the Unicode characters.</p>
    </div>
  </div>
</main>
